version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vms_db
      DB_USER: postgres
      DB_PASSWORD: password
      JWT_SECRET: local_dev_jwt_secret_change_in_production
      JWT_EXPIRES_IN: 24h
      FRONTEND_URL: http://localhost:3000
      SUPER_ADMIN_EMAIL: superadmin@vms.com
      SUPER_ADMIN_PASSWORD: SuperAdmin@123
      # Set these if you want real AI + email in dev:
      # AI_API_KEY: sk-...
      # AWS_SES_FROM_EMAIL: ...
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/src  # hot reload in dev
    command: sh -c "npm run migrate && npm run seed && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_data:
